services:
  oracle:
    image: gvenzl/oracle-xe:21-slim
    container_name: calendario-oracle
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: oracle
      APP_USER: cal
      APP_USER_PASSWORD: cal
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./backend/src/sql/initdb.sql:/container-entrypoint-initdb.d/initdb.sql
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  oracle-data:
